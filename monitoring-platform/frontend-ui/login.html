<!DOCTYPE html>
<html>

<head>

    <title>
        Test Cluster Infrastructure Monitoring Dashboard
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="cdot-login-body">

    <div class="top-logo">

        <img src="cdot.png">

    </div>

    <div class="login-container">

        <div class="login-card">

            <div class="login-header">

                <img src="cdot.png"
                     class="center-logo">
                     alt="C-DOT Logo"> 
                <h1>
                    Test Cluster Infrastructure Monitoring Dashboard
                </h1>

            </div>

            <label>Username</label>

            <input type="text"
                   id="username"
                   placeholder="Enter Username">

            <label>Password</label>

            <input type="password"
                   id="password"
                   placeholder="Enter Password">

            <button onclick="login()">
                Sign In
            </button>

            <p id="error"></p>

            <div class="footer-text">

                Powered by
                <span>
                    Centre for Development of Telematics
                </span>

            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
